<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest Journal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e24;
            --text-color: #e0e0e0;
            --accent-color: #d4af37; /* Золотий колір D&D */
            --border-color: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            line-height: 1.6;
        }
        h1 {
            text-align: center;
            color: var(--accent-color);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            margin-top: 5px;
            font-size: 22px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .section {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            border: 1px solid var(--border-color);
        }
        .section h2 {
            color: var(--accent-color);
            font-size: 18px;
            margin-top: 0;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .content {
            font-size: 15px;
            white-space: pre-wrap;
            color: #cccccc;
        }
        .empty-state {
            text-align: center;
            font-style: italic;
            color: #777;
            display: block;
            padding: 10px 0;
        }
        .error-state {
            color: #cc0000;
        }
    </style>
</head>
<body>

    <h1 id="main-title">📜 Журнал Героя</h1>

    <div class="section">
        <h2 id="quests-title">🎯 Активні Завдання</h2>
        <div id="quests" class="content">Завантаження...</div>
    </div>

    <div class="section">
        <h2 id="lore-title">🌍 Світовий Довідник</h2>
        <div id="lore" class="content">Завантаження...</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#121212');
        tg.setBackgroundColor('#121212');

        // Словник локалізації UI
        const userLang = tg.initDataUnsafe?.user?.language_code || 'uk';
        const dict = {
            en: { 
                title: "📜 HERO'S JOURNAL", quests: "🎯 Active Quests", lore: "🌍 World Compendium", 
                emptyQ: "No active quests.", emptyL: "The world is unknown. Explore!", 
                loading: "Loading...", errData: "❌ Data corrupted or missing." 
            },
            ru: { 
                title: "📜 ЖУРНАЛ ГЕРОЯ", quests: "🎯 Активные Задания", lore: "🌍 Мировой Справочник", 
                emptyQ: "Нет активных заданий.", emptyL: "Мир пока неизвестен. Исследуйте!", 
                loading: "Загрузка...", errData: "❌ Данные повреждены или не найдены." 
            },
            uk: { 
                title: "📜 ЖУРНАЛ ГЕРОЯ", quests: "🎯 Активні Завдання", lore: "🌍 Світовий Довідник", 
                emptyQ: "Немає активних завдань.", emptyL: "Світ поки невідомий. Досліджуйте!", 
                loading: "Завантаження...", errData: "❌ Дані пошкоджено або не знайдено." 
            }
        };
        const t = dict[userLang] || dict['uk'];

        // Перекладаємо статичні заголовки
        document.getElementById('main-title').innerText = t.title;
        document.getElementById('quests-title').innerText = t.quests;
        document.getElementById('quests').innerText = t.loading;
        document.getElementById('lore').innerText = t.loading;

        const params = new URLSearchParams(window.location.search);
        const b64Param = params.get("b64");

        if (b64Param) {
            try {
                // Безпечне декодування Base64 з підтримкою кирилиці
                const decodedStr = decodeURIComponent(escape(window.atob(b64Param)));
                const data = JSON.parse(decodedStr);

                // Розумна перевірка на "порожнечу" (розуміє Укр, Англ і Рос заглушки)
                const isDefault = (str) => {
                    if (!str || str.trim() === "" || str === "-") return true;
                    const lower = str.toLowerCase();
                    return lower.includes("немає активних завдань") || 
                           lower.includes("світ поки невідомий") || 
                           lower.includes("no active quests") || 
                           lower.includes("world is yet unknown") || 
                           lower.includes("нет активных заданий") || 
                           lower.includes("мир пока неизвестен");
                };

                // Вивід Квестів
                if (!isDefault(data.quests_active)) {
                    document.getElementById('quests').innerText = data.quests_active;
                } else {
                    document.getElementById('quests').innerHTML = `<span class="empty-state">${t.emptyQ}</span>`;
                }

                // Вивід Довідника
                if (!isDefault(data.world_knowledge)) {
                    document.getElementById('lore').innerText = data.world_knowledge;
                } else {
                    document.getElementById('lore').innerHTML = `<span class="empty-state">${t.emptyL}</span>`;
                }

            } catch (e) {
                console.error("Decode Error:", e);
                document.getElementById('quests').innerHTML = `<span class="empty-state error-state">${t.errData}</span>`;
                document.getElementById('lore').innerHTML = `<span class="empty-state error-state">${t.errData}</span>`;
            }
        } else {
            document.getElementById('quests').innerHTML = `<span class="empty-state error-state">${t.errData}</span>`;
            document.getElementById('lore').innerHTML = `<span class="empty-state error-state">${t.errData}</span>`;
        }
    </script>
</body>
</html>
