<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quest Journal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0f0f13; /* Глибокий темний фон */
            --card-bg: #1c1c24; /* Колір карток */
            --text-color: #dcdcdc;
            --accent-color: #d4af37; /* Золото Omni-Crown */
            --border-color: #2a2a35;
            --highlight: #e8c356;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
            line-height: 1.5;
        }

        h1 {
            text-align: center;
            color: var(--accent-color);
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
            margin-bottom: 25px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .section {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .section h2 {
            color: var(--highlight);
            font-size: 16px;
            margin-top: 0;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .content {
            font-size: 14px;
            color: #b0b0bc;
            white-space: pre-wrap;
        }

        /* Стилі для списку квестів */
        .quest-list {
            margin: 0;
            padding-left: 20px;
        }

        .quest-list li {
            margin-bottom: 12px;
            position: relative;
        }
        
        .quest-list li::marker {
            color: var(--accent-color);
        }

        .empty-state {
            text-align: center;
            font-style: italic;
            color: #666;
            display: block;
            padding: 15px 0;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
        }

        .error-state {
            color: #ff4d4d;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1 id="main-title">📜 Журнал Героя</h1>

    <div class="section">
        <h2 id="quests-title">🎯 Активні Завдання</h2>
        <div id="quests" class="content">Завантаження...</div>
    </div>

    <div class="section">
        <h2 id="lore-title">🌍 Світовий Довідник</h2>
        <div id="lore" class="content">Завантаження...</div>
    </div>

    <script>
        // 1. Ініціалізація Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        tg.setHeaderColor('#0f0f13');
        tg.setBackgroundColor('#0f0f13');

        // 2. Безпечний парсер Base64 (підтримує всі символи кирилиці)
        function safeDecodeBase64(b64) {
            try {
                return decodeURIComponent(atob(b64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
            } catch (e) {
                console.error("Decode Error:", e);
                return null;
            }
        }

        // 3. Розпакування даних з URL
        const params = new URLSearchParams(window.location.search);
        const b64Param = params.get("b64");
        let data = {};

        if (b64Param) {
            const decodedStr = safeDecodeBase64(b64Param);
            if (decodedStr) {
                try {
                    data = JSON.parse(decodedStr);
                } catch (e) {
                    console.error("JSON Parse Error:", e);
                }
            }
        }

        // 4. Локалізація
        const dict = {
            en: { 
                title: "📜 HERO'S JOURNAL", quests: "🎯 Active Quests", lore: "🌍 World Compendium", 
                emptyQ: "No active quests. Talk to NPCs to find work.", emptyL: "The world is yet unknown. Explore!", 
                loading: "Loading data...", errData: "❌ Data corrupted or missing." 
            },
            ru: { 
                title: "📜 ЖУРНАЛ ГЕРОЯ", quests: "🎯 Активные Задания", lore: "🌍 Мировой Справочник", 
                emptyQ: "Нет активных заданий. Поговорите с NPC.", emptyL: "Мир пока неизвестен. Исследуйте!", 
                loading: "Загрузка...", errData: "❌ Данные повреждены или не найдены." 
            },
            uk: { 
                title: "📜 ЖУРНАЛ ГЕРОЯ", quests: "🎯 Активні Завдання", lore: "🌍 Світовий Довідник", 
                emptyQ: "Немає активних завдань. Шукайте роботу в NPC.", emptyL: "Світ поки невідомий. Досліджуйте!", 
                loading: "Завантаження...", errData: "❌ Дані пошкоджено або не знайдено." 
            }
        };

        const userLang = data.lang || (tg.initDataUnsafe && tg.initDataUnsafe.user ? tg.initDataUnsafe.user.language_code : 'uk');
        const t = dict[userLang] || dict['uk'];

        // Застосування перекладів
        document.getElementById('main-title').innerText = t.title;
        document.getElementById('quests-title').innerText = t.quests;
        document.getElementById('lore-title').innerText = t.lore;

        // 5. Розумний аналізатор "порожнечі"
        const isDefaultOrEmpty = (input) => {
            if (!input || input.length === 0 || input === "-") return true;
            
            let str = Array.isArray(input) ? input.join(' ') : String(input);
            if (str.trim() === "") return true;
            
            const lower = str.toLowerCase();
            const badPhrases = [
                "немає активних", "світ поки невідомий", "no active", 
                "world is yet unknown", "нет активных", "мир пока неизвестен"
            ];
            return badPhrases.some(phrase => lower.includes(phrase));
        };

        // 6. Вивід даних
        if (Object.keys(data).length > 0) {
            
            // --- СЕКЦІЯ КВЕСТІВ ---
            const questsEl = document.getElementById('quests');
            let qData = data.quests_active;
            
            if (!isDefaultOrEmpty(qData)) {
                if (Array.isArray(qData)) {
                    // Якщо масив: робимо красивий HTML список
                    let htmlList = '<ul class="quest-list">';
                    qData.forEach(quest => {
                        if(quest.trim() !== "") htmlList += `<li>${quest}</li>`;
                    });
                    htmlList += '</ul>';
                    questsEl.innerHTML = htmlList;
                } else {
                    // Якщо текст: просто виводимо
                    questsEl.innerText = qData;
                }
            } else {
                questsEl.innerHTML = `<span class="empty-state">${t.emptyQ}</span>`;
            }

            // --- СЕКЦІЯ ЛОРУ ---
            const loreEl = document.getElementById('lore');
            let lData = data.world_knowledge;

            if (!isDefaultOrEmpty(lData)) {
                // Якщо лор прийшов масивом (на всяк випадок), з'єднуємо з перенесенням рядка
                loreEl.innerText = Array.isArray(lData) ? lData.join('\n\n') : lData;
            } else {
                loreEl.innerHTML = `<span class="empty-state">${t.emptyL}</span>`;
            }

        } else {
            // Помилка завантаження даних
            document.getElementById('quests').innerHTML = `<span class="empty-state error-state">${t.errData}</span>`;
            document.getElementById('lore').innerHTML = `<span class="empty-state error-state">${t.errData}</span>`;
        }
    </script>
</body>
</html>
