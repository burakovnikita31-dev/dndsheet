<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest Journal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e24;
            --text-color: #e0e0e0;
            --accent-color: #d4af37; /* Золотий колір D&D */
            --border-color: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            line-height: 1.6;
        }
        h1 {
            text-align: center;
            color: var(--accent-color);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            margin-top: 5px;
            font-size: 22px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .section {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            border: 1px solid var(--border-color);
        }
        .section h2 {
            color: var(--accent-color);
            font-size: 18px;
            margin-top: 0;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .content {
            font-size: 15px;
            white-space: pre-wrap;
            color: #cccccc;
        }
        .empty-state {
            text-align: center;
            font-style: italic;
            color: #777;
            display: block;
            padding: 10px 0;
        }
    </style>
</head>
<body>

    <h1 id="main-title">📜 Журнал Героя</h1>

    <div class="section">
        <h2 id="quests-title">🎯 Активні Завдання</h2>
        <div id="quests" class="content">...</div>
    </div>

    <div class="section">
        <h2 id="lore-title">🌍 Світовий Довідник</h2>
        <div id="lore" class="content">...</div>
    </div>

    <script>
        // Ініціалізуємо Telegram WebApp
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand(); 

        // СЛОВНИК ЛОКАЛІЗАЦІЇ ІНТЕРФЕЙСУ
        const uiDict = {
            'uk': {
                title: "📜 Журнал Героя",
                quests: "🎯 Активні Завдання",
                lore: "🌍 Світовий Довідник",
                emptyQ: '<span class="empty-state">Немає активних завдань.</span>',
                emptyL: '<span class="empty-state">Світ поки невідомий. Досліджуйте!</span>',
                errRead: "❌ Помилка читання сувою.",
                errData: "❌ Дані пошкоджено або не знайдено."
            },
            'en': {
                title: "📜 Hero's Journal",
                quests: "🎯 Active Quests",
                lore: "🌍 World Compendium",
                emptyQ: '<span class="empty-state">No active quests.</span>',
                emptyL: '<span class="empty-state">The world is unknown. Explore!</span>',
                errRead: "❌ Error reading the scroll.",
                errData: "❌ Data corrupted or missing."
            },
            'ru': {
                title: "📜 Журнал Героя",
                quests: "🎯 Активные Задания",
                lore: "🌍 Мировой Справочник",
                emptyQ: '<span class="empty-state">Нет активных заданий.</span>',
                emptyL: '<span class="empty-state">Мир пока неизвестен. Исследуйте!</span>',
                errRead: "❌ Ошибка чтения свитка.",
                errData: "❌ Данные повреждены или не найдены."
            }
        };

        // Визначаємо мову Telegram клієнта (за замовчуванням 'uk')
        const tgUser = window.Telegram.WebApp.initDataUnsafe?.user;
        let lang = 'uk';
        if (tgUser && tgUser.language_code) {
            if (tgUser.language_code.startsWith('ru')) lang = 'ru';
            else if (tgUser.language_code.startsWith('en')) lang = 'en';
        }

        // Перекладаємо статичні заголовки
        document.getElementById('main-title').innerHTML = uiDict[lang].title;
        document.getElementById('quests-title').innerHTML = uiDict[lang].quests;
        document.getElementById('lore-title').innerHTML = uiDict[lang].lore;

        // Декодування Base64
        function b64DecodeUnicode(str) {
            try {
                return decodeURIComponent(atob(str).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
            } catch (e) {
                console.error("Decode Error:", e);
                return null;
            }
        }

        // Парсинг даних
        const urlParams = new URLSearchParams(window.location.search);
        const b64Data = urlParams.get('b64');
        const questsEl = document.getElementById('quests');
        const loreEl = document.getElementById('lore');

        if (b64Data) {
            const jsonString = b64DecodeUnicode(b64Data);
            if (jsonString) {
                try {
                    const data = JSON.parse(jsonString);
                    
                    // Динамічний вивід квестів
                    if (data.quests_active && data.quests_active.trim() !== "" && data.quests_active !== "Немає активних завдань.") {
                        questsEl.innerHTML = data.quests_active;
                    } else {
                        questsEl.innerHTML = uiDict[lang].emptyQ;
                    }

                    // Динамічний вивід знань про світ
                    if (data.world_knowledge && data.world_knowledge.trim() !== "" && data.world_knowledge !== "Світ поки невідомий.") {
                        loreEl.innerHTML = data.world_knowledge;
                    } else {
                        loreEl.innerHTML = uiDict[lang].emptyL;
                    }

                } catch (e) {
                    questsEl.innerHTML = uiDict[lang].errRead;
                    loreEl.innerHTML = uiDict[lang].errRead;
                }
            } else {
                questsEl.innerHTML = uiDict[lang].errData;
                loreEl.innerHTML = uiDict[lang].errData;
            }
        } else {
            questsEl.innerHTML = uiDict[lang].errData;
            loreEl.innerHTML = uiDict[lang].errData;
        }
    </script>
</body>
</html>
