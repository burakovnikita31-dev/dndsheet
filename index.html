<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D Character Sheet</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            font-family: 'Georgia', serif; 
            background: #f4e4bc; 
            color: #2c1e16; 
            padding: 15px; 
            margin: 0;
        }
        .sheet { 
            border: 2px solid #8b4513; 
            padding: 15px; 
            border-radius: 10px; 
            background: #fff9eb; 
            box-shadow: 0 0 15px rgba(0,0,0,0.3); 
        }
        h1 { 
            text-align: center; 
            border-bottom: 2px solid #8b4513; 
            margin-top: 0; 
            margin-bottom: 5px; 
            font-size: 24px;
        }
        .meta-header {
            text-align: center;
            font-size: 13px;
            color: #8b4513;
            margin-bottom: 10px;
            font-style: italic;
            border-bottom: 1px solid rgba(139, 69, 19, 0.3);
            padding-bottom: 5px;
        }
        .level-header { 
            text-align: center; 
            font-size: 16px; 
            font-weight: bold; 
            color: #5a2e0c; 
            margin-bottom: 15px; 
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .inspiration-badge {
            background: #e2d8c3;
            color: #7a6b58;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: bold;
            border: 1px solid #c9bda5;
            display: inline-block;
            transition: all 0.3s ease;
        }
        .inspiration-badge.active {
            background: #ffd700;
            color: #8b4513;
            box-shadow: 0 0 8px rgba(255, 215, 0, 0.8);
            border: 1px solid #c5a000;
        }
        .grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            margin-bottom: 15px; 
        }
        .stat-box { 
            background: #8b4513; 
            color: white; 
            text-align: center; 
            padding: 8px 5px; 
            border-radius: 5px; 
            border: 1px solid #5a2e0c;
        }
        .stat-value { 
            font-size: 18px; 
            font-weight: bold; 
        }
        .label { 
            font-size: 11px; 
            text-transform: uppercase; 
            margin-top: 3px;
        }
        .info-row { 
            margin: 5px 0; 
            border-bottom: 1px dashed #dcb889; 
            padding-bottom: 4px;
            font-size: 14px;
        }
        .section-title { 
            font-weight: bold; 
            color: #8b4513; 
            margin-top: 20px; 
            display: block; 
            border-bottom: 2px solid #8b4513; 
            margin-bottom: 10px;
            font-size: 18px;
        }
        .text-block {
            font-size: 14px; 
            white-space: pre-wrap; 
            line-height: 1.5;
