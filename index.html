<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D Character Sheet</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            font-family: 'Georgia', serif; 
            background: #f4e4bc; 
            color: #2c1e16; 
            padding: 15px; 
            margin: 0;
        }
        .sheet { 
            border: 2px solid #8b4513; 
            padding: 15px; 
            border-radius: 10px; 
            background: #fff9eb; 
            box-shadow: 0 0 15px rgba(0,0,0,0.3); 
        }
        h1 { 
            text-align: center; 
            border-bottom: 2px solid #8b4513; 
            margin-top: 0; 
            margin-bottom: 5px; 
            font-size: 24px;
        }
        .level-header { 
            text-align: center; 
            font-size: 16px; 
            font-weight: bold; 
            color: #5a2e0c; 
            margin-bottom: 15px; 
        }
        .grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            margin-bottom: 15px; 
        }
        .stat-box { 
            background: #8b4513; 
            color: white; 
            text-align: center; 
            padding: 8px 5px; 
            border-radius: 5px; 
            border: 1px solid #5a2e0c;
        }
        .stat-value { 
            font-size: 18px; 
            font-weight: bold; 
        }
        .label { 
            font-size: 11px; 
            text-transform: uppercase; 
            margin-top: 3px;
        }
        .info-row { 
            margin: 5px 0; 
            border-bottom: 1px dashed #dcb889; 
            padding-bottom: 4px;
            font-size: 14px;
        }
        .section-title { 
            font-weight: bold; 
            color: #8b4513; 
            margin-top: 20px; 
            display: block; 
            border-bottom: 2px solid #8b4513; 
            margin-bottom: 10px;
            font-size: 18px;
        }
        .text-block {
            font-size: 14px; 
            white-space: pre-wrap; 
            line-height: 1.5;
            background: rgba(139, 69, 19, 0.05);
            padding: 8px;
            border-radius: 5px;
            border: 1px solid rgba(139, 69, 19, 0.2);
        }
        .actions-block {
            border-left: 4px solid #8b0000; /* Червона лінія для акценту на атаках */
        }
        .danger-text {
            color: #8b0000;
        }
    </style>
</head>
<body>
    <div class="sheet">
        <h1 id="name">Завантаження...</h1>
        <div class="level-header">Рівень: <span id="level">-</span> | XP: <span id="xp">-</span></div>
        
        <div class="grid">
            <div class="info-row"><b>Раса:</b> <span id="race">-</span></div>
            <div class="info-row"><b>Клас:</b> <span id="class">-</span></div>
            <div class="info-row"><b>ХП:</b> <span id="hp">-</span></div>
            <div class="info-row"><b>AC:</b> <span id="ac">-</span></div>
            <div class="info-row"><b>Швидкість:</b> <span id="speed">-</span></div>
            <div class="info-row"><b>Золото:</b> <span id="gold">0</span> зм</div>
            
            <div id="magic-section" class="info-row" style="grid-column: span 2; border-bottom: 2px solid #8b4513; margin-top: 5px;">
                <b>Магія та Комірки:</b><br>
                <span id="spells">-</span>
            </div>
            
            <div class="info-row danger-text" style="grid-column: span 2; border-bottom: 2px solid #8b4513; margin-top: 5px;">
                <b>Рятівні кидки від смерті:</b> <span id="death-saves">-</span>
            </div>
        </div>
        
        <div class="section-title">Характеристики</div>
        <div class="grid" id="stats-grid"></div>

        <div class="section-title">Активні здібності та Атаки</div>
        <div class="text-block actions-block" id="actions">Порожньо</div>

        <div class="section-title">Екіпірування</div>
        <div class="text-block" id="equipped">Порожньо</div>

        <div class="section-title">Рюкзак (Інвентар)</div>
        <div class="text-block" id="inventory">Порожньо</div>

        <div class="section-title">Пасивні Навички та Риси</div>
        <div class="text-block" id="skills">Порожньо</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 

        const params = new URLSearchParams(window.location.search);
        const dataParam = params.get("data");
        const b64Param = params.get("b64");

        let sheetData = null;

        try {
            if (b64Param) {
                const decodedStr = decodeURIComponent(escape(atob(b64Param)));
                sheetData = JSON.parse(decodedStr);
            } else if (dataParam) {
                sheetData = JSON.parse(decodeURIComponent(dataParam));
            }
            
            if (sheetData) {
                document.getElementById('name').innerText = sheetData.name || "Невідомо";
                document.getElementById('level').innerText = sheetData.level || "1";
                document.getElementById('xp').innerText = sheetData.xp || "0/300";
                document.getElementById('race').innerText = sheetData.race || "-";
                document.getElementById('class').innerText = sheetData.class || "-";
                document.getElementById('hp').innerText = sheetData.hp || "-";
                document.getElementById('ac').innerText = sheetData.ac || "-";
                document.getElementById('speed').innerText = sheetData.speed || "-";
                document.getElementById('gold').innerText = sheetData.gold || "0";
                
                document.getElementById('actions').innerText = sheetData.actions || "Немає активних дій";
                document.getElementById('equipped').innerText = sheetData.equipped || "Нічого не екіпіровано";
                document.getElementById('inventory').innerText = sheetData.inventory || "Порожньо";
                document.getElementById('skills').innerText = sheetData.skills || "Немає пасивних навичок";

                const spellText = sheetData.spells || "";
                if (!spellText || spellText.toLowerCase().includes("немає магії") || spellText.toLowerCase().includes("немає")) {
                    document.getElementById('magic-section').style.display = 'none';
                } else {
                    document.getElementById('magic-section').style.display = 'block';
                    document.getElementById('spells').innerText = spellText;
                }

                if (sheetData.death_saves) {
                    document.getElementById('death-saves').innerText = sheetData.death_saves;
                }

                const statsGrid = document.getElementById('stats-grid');
                statsGrid.innerHTML = ''; 
                if (sheetData.stats) {
                    for (const [key, value] of Object.entries(sheetData.stats)) {
                        statsGrid.innerHTML += `
                            <div class="stat-box">
                                <div class="stat-value">${value}</div>
                                <div class="label">${key}</div>
                            </div>`;
                    }
                }
            } else {
                document.getElementById('name').innerText = "Дані відсутні";
            }
        } catch (e) {
            console.error("Помилка парсингу JSON:", e);
            document.getElementById('name').innerText = "Помилка завантаження";
        }
    </script>
</body>
</html>
