<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D Character Sheet</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            font-family: 'Georgia', serif; 
            background: #f4e4bc; 
            color: #2c1e16; 
            padding: 15px; 
            margin: 0;
        }
        .sheet { 
            border: 2px solid #8b4513; 
            padding: 15px; 
            border-radius: 10px; 
            background: #fff9eb; 
            box-shadow: 0 0 15px rgba(0,0,0,0.3); 
        }
        h1 { 
            text-align: center; 
            border-bottom: 2px solid #8b4513; 
            margin-top: 0; 
            margin-bottom: 5px; 
            font-size: 24px;
        }
        /* Календар та Вік */
        .meta-header {
            text-align: center;
            font-size: 13px;
            color: #8b4513;
            margin-bottom: 10px;
            font-style: italic;
            border-bottom: 1px solid rgba(139, 69, 19, 0.3);
            padding-bottom: 5px;
        }
        .level-header { 
            text-align: center; 
            font-size: 16px; 
            font-weight: bold; 
            color: #5a2e0c; 
            margin-bottom: 15px; 
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .inspiration-badge {
            background: #e2d8c3;
            color: #7a6b58;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: bold;
            border: 1px solid #c9bda5;
            display: inline-block;
            transition: all 0.3s ease;
        }
        .inspiration-badge.active {
            background: #ffd700;
            color: #8b4513;
            box-shadow: 0 0 8px rgba(255, 215, 0, 0.8);
            border: 1px solid #c5a000;
        }
        .grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            margin-bottom: 15px; 
        }
        .stat-box { 
            background: #8b4513; 
            color: white; 
            text-align: center; 
            padding: 8px 5px; 
            border-radius: 5px; 
            border: 1px solid #5a2e0c;
        }
        .stat-value { 
            font-size: 18px; 
            font-weight: bold; 
        }
        .label { 
            font-size: 11px; 
            text-transform: uppercase; 
            margin-top: 3px;
        }
        .info-row { 
            margin: 5px 0; 
            border-bottom: 1px dashed #dcb889; 
            padding-bottom: 4px;
            font-size: 14px;
        }
        .section-title { 
            font-weight: bold; 
            color: #8b4513; 
            margin-top: 20px; 
            display: block; 
            border-bottom: 2px solid #8b4513; 
            margin-bottom: 10px;
            font-size: 18px;
        }
        .text-block {
            font-size: 14px; 
            white-space: pre-wrap; 
            line-height: 1.5;
            background: rgba(139, 69, 19, 0.05);
            padding: 8px;
            border-radius: 5px;
            border: 1px solid rgba(139, 69, 19, 0.2);
        }
        .actions-block { border-left: 4px solid #8b0000; }
        .background-block { border-left: 4px solid #b8860b; background: rgba(184, 134, 11, 0.05); }
        .danger-text { color: #8b0000; }
        
        /* Статус (Виснаження/Голод) */
        .status-row {
            grid-column: span 2; 
            border-top: 2px solid #8b4513; 
            margin-top: 5px; 
            padding-top: 8px;
            color: #d35400; 
            font-weight: bold;
            text-align: center;
            font-size: 15px;
        }

        .spell-slots {
            background: #e6f2ff;
            border: 1px solid #b3d9ff;
            padding: 6px;
            border-radius: 5px;
            color: #005580;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .magic-bg { border-left: 4px solid #4b0082; background: rgba(75, 0, 130, 0.05); }
    </style>
</head>
<body>
    <div class="sheet">
        <h1 id="name">Завантаження...</h1>
        
        <div class="meta-header">
            📅 <span id="date">Завантаження дати...</span> | 👤 Вік: <span id="age">-</span>
        </div>

        <div class="level-header">
            <span>Рівень: <span id="level">-</span> | XP: <span id="xp">-</span></span>
            <span id="inspiration" class="inspiration-badge">🌟 Натхнення: 0</span>
        </div>
        
        <div class="grid">
            <div class="info-row"><b>Раса:</b> <span id="race">-</span></div>
            <div class="info-row"><b>Клас:</b> <span id="class">-</span></div>
            <div class="info-row"><b>ХП:</b> <span id="hp">-</span></div>
            <div class="info-row"><b>AC:</b> <span id="ac">-</span></div>
            <div class="info-row"><b>Швидкість:</b> <span id="speed">-</span></div>
            <div class="info-row"><b>Золото:</b> <span id="gold">-</span></div>
            
            <div class="status-row">
                <b>Стан:</b> <span id="status">Завантаження...</span>
            </div>

            <div class="info-row danger-text" style="grid-column: span 2; border-bottom: 2px solid #8b4513;">
                <b>Рятівні кидки від смерті:</b> <span id="death-saves">-</span>
            </div>
        </div>
        
        <div class="section-title">Характеристики</div>
        <div class="grid" id="stats-grid"></div>

        <div class="section-title">Бекграунд та Характер</div>
        <div class="text-block background-block" id="background">-</div>

        <div class="section-title">Дії та Атаки</div>
        <div class="text-block actions-block" id="actions">-</div>

        <div id="magic-section" style="display: none;">
            <div class="section-title">Магія</div>
            <div id="spell-slots" class="spell-slots"></div>
            <div class="text-block magic-bg" id="spells"></div>
        </div>

        <div class="section-title">Екіпірування</div>
        <div class="text-block" id="equipped">-</div>

        <div class="section-title">Інвентар</div>
        <div class="text-block" id="inventory">-</div>

        <div class="section-title">Навички та Риси</div>
        <div class="text-block" id="skills">-</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 

        const params = new URLSearchParams(window.location.search);
        const b64Param = params.get("b64");

        try {
            if (b64Param) {
                // Декодування Base64 для Telegram
                const decodedStr = decodeURIComponent(escape(atob(b64Param)));
                const data = JSON.parse(decodedStr);
                
                // Відображення Дати та Віку (Алгоритм 8 та 13)
                document.getElementById('date').innerText = data.date || "Дата невідома";
                document.getElementById('age').innerText = data.age || "-";
                
                // Заповнення основних полів
                document.getElementById('name').innerText = data.name || "Герой";
                document.getElementById('level').innerText = data.level || "1";
                document.getElementById('xp').innerText = data.xp || "0";
                document.getElementById('race').innerText = data.race || "-";
                document.getElementById('class').innerText = data.class || "-";
                document.getElementById('hp').innerText = data.hp || "-";
                document.getElementById('ac').innerText = data.ac || "-";
                document.getElementById('speed').innerText = data.speed || "-";
                document.getElementById('gold').innerText = data.gold || "0";
                document.getElementById('death-saves').innerText = data.death_saves || "-";

                // Оновлення Статусу (Авто-їжа/Виснаження)
                document.getElementById('status').innerText = data.status || "Нормальний";

                // Логіка Натхнення (Алгоритм 17)
                const insp = document.getElementById('inspiration');
                if (String(data.inspiration) === "1") {
                    insp.innerText = "🌟 Натхнення: 1";
                    insp.className = "inspiration-badge active";
                } else {
                    insp.innerText = "🌟 Натхнення: 0";
                    insp.className = "inspiration-badge";
                }

                // Текстові блоки (Алгоритм 13)
                document.getElementById('background').innerText = data.background || "-";
                document.getElementById('actions').innerText = data.actions || "-";
                document.getElementById('equipped').innerText = data.equipped || "-";
                document.getElementById('inventory').innerText = data.inventory || "-";
                document.getElementById('skills').innerText = data.skills || "-";

                // Генерація Характеристик
                const statsGrid = document.getElementById('stats-grid');
                statsGrid.innerHTML = '';
                if (data.stats) {
                    Object.entries(data.stats).forEach(([key, val]) => {
                        statsGrid.innerHTML += `
                            <div class="stat-box">
                                <div class="stat-value">${val}</div>
                                <div class="label">${key}</div>
                            </div>`;
                    });
                }

                // Логіка Магії (Алгоритм 14)
                const magicSec = document.getElementById('magic-section');
                const slots = document.getElementById('spell-slots');
                const spells = document.getElementById('spells');
                
                if (data.spells && data.spells !== "Немає магії" && data.spells !== "-") {
                    magicSec.style.display = 'block';
                    spells.innerText = data.spells;
                    if (data.spell_slots && data.spell_slots !== "-") {
                        slots.innerText = "Комірки: " + data.spell_slots;
                        slots.style.display = 'block';
                    } else {
                        slots.style.display = 'none';
                    }
                } else {
                    magicSec.style.display = 'none';
                }
            }
        } catch (e) {
            document.getElementById('name').innerText = "Помилка даних";
            console.error(e);
        }
    </script>
</body>
</html>
